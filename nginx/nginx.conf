events {
    worker_connections 1024;
}

http {
    # Resolver DNS interno de Docker con TTL bajo para re-resolver IPs
    resolver 127.0.0.11 valid=5s;

    server {
        listen 80;

        location / {
            # Usar variable para forzar re-resolución DNS en cada request.
            # Si nginx usa upstream{} con nombre, cachea la IP indefinidamente.
            set $flet_app http://app:8550;
            proxy_pass $flet_app;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 30s;

            proxy_buffering off;
        }
    }
}
