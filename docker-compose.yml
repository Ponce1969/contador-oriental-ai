
services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: auditor_familiar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditor_familiar}
      POSTGRES_USER: ${POSTGRES_USER:-auditor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - auditor_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditor_user} -d ${POSTGRES_DB:-auditor_familiar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auditor Familiar Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auditor_familiar_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_TYPE: postgresql
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-auditor_familiar}
      POSTGRES_USER: ${POSTGRES_USER:-auditor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Application
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      DEBUG: ${DEBUG:-False}
      
      # OCR Microservice
      OCR_API_URL: ${OCR_API_URL:-http://ocr_api:8551}
      OCR_API_PUBLIC_URL: ${OCR_API_PUBLIC_URL:-http://localhost:8551}

      # Ollama IA
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: /app/logs/app.log
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - app_data:/app/data
      - ./exports:/app/exports
    networks:
      - auditor_network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # pgAdmin (opcional, para administración de BD)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auditor_familiar_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@auditor.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - auditor_network
    profiles:
      - admin

  # Nginx Reverse Proxy (WebSocket keepalive)
  nginx:
    image: nginx:alpine
    container_name: auditor_familiar_nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-8552}:80"
    networks:
      - auditor_network

  # OCR API Microservice
  ocr_api:
    build:
      context: ./ocr_api
      dockerfile: Dockerfile
    container_name: auditor_familiar_ocr_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-auditor_familiar}
      POSTGRES_USER: ${POSTGRES_USER:-auditor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_HOST: 0.0.0.0
      API_PORT: 8551
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OCR_PORT:-8551}:8551"
    networks:
      - auditor_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8551/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Guardian Service - Monitoreo y Alertas
  guardian:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auditor_familiar_guardian
    restart: unless-stopped
    depends_on:
      - app
      - postgres
      - ocr_api
    environment:
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-https://discord.com/api/webhooks/1489405150425776169/MpA53Ap6AneB1ZoPfLO6NxEJaU-4iYvNoh8O5naKS1GnKSwaNme5W53l7_COy_DzeVcH}
      GUARDIAN_CHECK_INTERVAL: ${GUARDIAN_CHECK_INTERVAL:-60}
      # Override de variables del app para guardian
      APP_ENV: guardian
      SKIP_WEB_SERVER: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/app/logs
      - guardian_data:/app/.venv
    networks:
      - auditor_network
    user: "0:0"  # Ejecutar como root para acceso a Docker socket
    entrypoint: ["uv", "run", "--no-project", "python", "guardian/guardian_service.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  app_data:
    driver: local
  guardian_data:
    driver: local

networks:
  auditor_network:
    driver: bridge
